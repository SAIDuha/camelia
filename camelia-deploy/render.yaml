services:
  - type: web
    name: camelia
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: camelia-db
          property: connectionString

databases:
  - name: camelia-db
    plan: free
    databaseName: camelia
    user: camelia_user
